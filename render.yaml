services:
  - type: web
    name: gulf-strikes-dashboard
    runtime: python
    pythonVersion: "3.12.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
